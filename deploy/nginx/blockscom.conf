# Replace `server_name` with your real domain(s) before enabling this site.
# This template is prepared for:
# - blockscom.xyz
# - www.blockscom.xyz
# - tiktok.ramilflaviano.art
#
# Keep this file HTTP-only initially, then run Certbot with all hostnames so it
# can install the matching HTTPS server block automatically.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream blockscom_app {
    server 127.0.0.1:10000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name blockscom.xyz www.blockscom.xyz tiktok.ramilflaviano.art;

    client_max_body_size 200m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    location / {
        proxy_pass http://blockscom_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
    }
}
